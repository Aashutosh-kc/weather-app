<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Weather App</title>
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id = "container">
			<label for="cityInput">Enter your city name: </label>
			<div id="input-area">
				<input type="text" id="cityInput" placeholder="e.g. kathmandu"></input>
			<button id="searchBtn" type="button">Search</button>
		</div>

		<div id = "weather-info">
			<p id="city-name"></p>
			<img src="" alt="" id="icon">
			<h1 id="temp"></h1>
			<p id="description"></p>
			<p id="humidity"></p>
			<p id="wind"></p>
			
		</div>
	</div>
<script src="script.js"></script>
</body>
</html>
